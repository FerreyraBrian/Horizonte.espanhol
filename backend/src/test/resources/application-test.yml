spring:
  datasource:
    url: jdbc:h2:mem:horizonte_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: false

server:
  servlet:
    context-path: /api

jwt:
  secret: horizonte-test-secret-key-change-in-production-2026
  expiration: 86400000

app:
  cors:
    allowed-origins: http://localhost:5173
