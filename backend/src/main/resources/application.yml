spring:
  application:
    name: horizonte-api
  datasource:
    url: jdbc:postgresql://localhost:5432/horizonte_dev
    username: dev_user
    password: dev_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 3001
  servlet:
    context-path: /api

jwt:
  secret: horizonte-secret-key-change-in-production
  expiration: 86400000

logging:
  level:
    root: INFO
    com.horizonte: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
