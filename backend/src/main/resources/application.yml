spring:
  application:
    name: horizonte-api
  datasource:
    url: ${DB_URL:jdbc:h2:mem:horizonte_dev;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  web:
    resources:
      static-locations: classpath:/static/,file:../frontend/build/
      cache:
        period: 0
  mvc:
    static-path-pattern: /**

server:
  port: 3001

jwt:
  secret: ${JWT_SECRET:horizonte-secret-key-change-in-production-2026-secure}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  security:
    seed-admin-email: ${ADMIN_EMAIL:admin@horizonteespanhol.com}
    seed-admin-password: ${ADMIN_PASSWORD:Admin@12345}
    seed-student-email: ${STUDENT_EMAIL:aluno@horizonteespanhol.com}
    seed-student-password: ${STUDENT_PASSWORD:Aluno@12345}

logging:
  level:
    root: INFO
    com.horizonte: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
